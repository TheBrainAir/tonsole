name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # A tag push does NOT trigger ci.yml (it listens on branch pushes / PRs only), so run
  # the full gate here. A bundle that fails lint/typecheck/test/build must never publish.
  verify:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: release # matches the environment set on npm's trusted publisher
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC identity for npm trusted publishing (also signs provenance)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.12'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22.12 ships npm 10.x.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Verify the tag matches package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Extract this version's changelog section
        run: |
          # index(...)==1 matches the header as a literal string, so the dots in the
          # version are not treated as regex wildcards; stop at the next section or the
          # trailing link-reference block.
          awk -v ver="${GITHUB_REF_NAME#v}" '
            index($0, "## [" ver "]") == 1 { p = 1; next }
            p && /^## \[/ { exit }
            p && /^\[.*\]:/ { exit }
            p { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi

      - run: npm ci
      - run: npm run build

      # Create the Release FIRST (idempotent): npm publish is not idempotent, so if it
      # ran first a failed release step could never be re-run to completion.
      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md --verify-tag
          fi

      # No token: authentication is the workflow's own OIDC identity, trusted by the
      # package's publisher config on npm. Provenance is attached automatically.
      - name: Publish to npm (trusted publishing)
        run: npm publish
