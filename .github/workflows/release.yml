name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # A tag push does NOT trigger ci.yml (it listens on branch pushes / PRs only), so run
  # the full gate here. A bundle that fails lint/typecheck/test/build must never publish.
  verify:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: release # scopes the NPM_TOKEN secret to this job
    permissions:
      contents: write # create the GitHub Release
      id-token: write # npm provenance (OIDC)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '22.12'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Verify the tag matches package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Extract this version's changelog section
        run: |
          # index(...)==1 matches the header as a literal string, so the dots in the
          # version are not treated as regex wildcards; stop at the next section or the
          # trailing link-reference block.
          awk -v ver="${GITHUB_REF_NAME#v}" '
            index($0, "## [" ver "]") == 1 { p = 1; next }
            p && /^## \[/ { exit }
            p && /^\[.*\]:/ { exit }
            p { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi

      - run: npm ci
      - run: npm run build

      # Create the Release FIRST: npm publish is not idempotent (a retry after a
      # successful publish 403s on EPUBLISHCONFLICT), so if it ran first a failed
      # release step could never be re-run to completion.
      # Idempotent so the workflow can be re-run after adding NPM_TOKEN: create the
      # Release the first time, just refresh its notes if it already exists.
      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md --verify-tag
          fi

      # Skip (don't fail) when NPM_TOKEN isn't configured yet, so a maintainer can cut a
      # GitHub Release before wiring up npm. Add the secret and re-run to publish.
      - name: Check for an npm token
        id: npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN is not set — skipping npm publish. Add it to the 'release' environment and re-run to publish."
          fi

      - name: Publish to npm (with provenance)
        if: steps.npm.outputs.present == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
