name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Let the release workflow invoke this exact gate on a tag push (a tag does not
  # trigger the push/pull_request events above), so a broken bundle can never publish.
  workflow_call:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ['22.12', '22']
        # argon2 is a native node-gyp addon and clipboardy shells out to platform
        # binaries — the exact places a Linux-only matrix would miss a break. Smoke
        # macOS on the primary Node line.
        include:
          - os: macos-latest
            node-version: '22'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # The build is the riskiest step (tsup must bundle the broken @ton/walletkit
      # ESM); make sure a broken bundle can never reach npm.
      - run: npm run build
      - run: node dist/index.js --help
      - run: npm pack --dry-run
